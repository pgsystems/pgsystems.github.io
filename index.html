<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoWiki - El Verdadero Conocimiento de la Programación</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="png_pequeño.png" type="image/png">
</head>
<body>
    <header>
        <h1>TechnoWiki</h1>
        <nav>
            <button id="btnHome" onclick="showPanel('homePanel')">Inicio</button>
            <button id="btnCreate" onclick="showPanel('createPanel')">Crear Artículo</button>
            <button id="btnAdmin" onclick="showPanel('adminPanel')">Panel de Admin</button>
        </nav>
    </header>

    <main>
        <section id="homePanel">
            <h2>Artículos Recientes</h2>
            <div id="articlesList"></div>
        </section>

        <section id="createPanel" style="display: none;">
            <h2>Crear Artículo</h2>
            <input type="text" id="articleTitle" placeholder="Título del artículo">
            <textarea id="articleContent" placeholder="Contenido del artículo"></textarea>
            <button onclick="createArticle()">Guardar Artículo</button>
        </section>

        <section id="adminPanel" style="display: none;">
            <h2>Panel de Administración</h2>
            <div id="adminActions">
                <button onclick="loadUsers()">Cargar Usuarios</button>
                <div id="usersList"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 TechnoWiki</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

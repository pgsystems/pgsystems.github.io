<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoWiki</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <header>
        <h1>TechnoWiki</h1>
        <nav>
            <button onclick="loadArticles()">Artículos</button>
            <button onclick="showCreatePanel()">Crear Artículo</button>
            <button onclick="showAdminPanel()">Panel de Admin</button>
            <button onclick="logout()">Cerrar Sesión</button>
        </nav>
    </header>

    <main>
        <section id="articlesPanel"></section>
        <section id="createPanel" style="display: none;">
            <h2>Crear un nuevo artículo</h2>
            <input type="text" id="articleTitle" placeholder="Título del artículo">
            <textarea id="articleContent" placeholder="Contenido del artículo"></textarea>
            <button onclick="createArticle()">Guardar</button>
        </section>
        <section id="adminPanel" style="display: none;">
            <h2>Panel de Administración</h2>
            <button onclick="loadUsers()">Cargar Usuarios</button>
            <div id="usersList"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 TechnoWiki</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoWiki</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <div id="app">
        <header>
            <h1>TechnoWiki</h1>
            <nav>
                <button onclick="showSection('adminPanel')">Panel de Administración</button>
                <button onclick="showSection('editor')">Editor</button>
                <button onclick="showSection('viewer')">Ver Artículos</button>
                <button onclick="showSection('create')">Crear Artículo</button>
            </nav>
        </header>

        <main>
            <!-- Panel de Administración -->
            <section id="adminPanel" class="hidden">
                <h2>Panel de Administración</h2>
                <p>Gestión de usuarios y roles.</p>
            </section>

            <!-- Editor de Artículos -->
            <section id="editor" class="hidden">
                <h2>Editor</h2>
                <textarea id="editContent" rows="10"></textarea>
                <button onclick="saveArticle()">Guardar Cambios</button>
            </section>

            <!-- Vista de Artículos -->
            <section id="viewer" class="hidden">
                <h2>Lista de Artículos</h2>
                <ul id="articles">
                    <!-- Los artículos se cargarán aquí dinámicamente -->
                </ul>
                <div id="articleDetails">
                    <h3 id="articleTitle">Título del Artículo</h3>
                    <p id="articleContent">Selecciona un artículo para ver su contenido.</p>
                </div>
            </section>

            <!-- Crear Nuevo Artículo -->
            <section id="create" class="hidden">
                <h2>Crear Artículo</h2>
                <input type="text" id="newTitle" placeholder="Título del Artículo">
                <textarea id="newContent" rows="5" placeholder="Contenido del Artículo"></textarea>
                <button onclick="createArticle()">Crear Artículo</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
